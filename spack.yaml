# This is a Spack Environment file.
#
# It describes the set of packages to be installed when developing,
# along with configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - pk.penknife ^neso.adaptivecpp compilationflow=omplibraryonly ^neso+libonly ^neso-particles~build_tests
  view: true
  concretizer:
    unify: when_possible
  repos:
  - ./repo
  - ./NESO/NESO-Spack
  - ./VANTAGE-Reactions/Reactions-repo
  packages:
    c:
      require:
        - gcc
    cxx:
      require:
        - gcc
    all:
      providers:
        sycl: [adaptivecpp]
        mpi: [mpich, openmpi]
  develop:
    nektar:
      path: ./NESO/nektar
      spec: nektar@master
    neso:
      path: ./NESO
      spec: neso@working
    neso-particles:
      path: ./NESO/neso-particles
      spec: neso-particles@working
    reactions:
      path: ./VANTAGE-Reactions
      spec: reactions@working
    penknife:
      path: ./
      spec: penknife@working
